<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>markdown-stream playground</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f5f5f5;
        color: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .landing {
        text-align: center;
        padding: 48px 24px;
      }
      h1 { font-size: 2rem; margin-bottom: 8px; }
      p { color: #6b7280; margin-bottom: 40px; }
      .cards {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
      }
      a.card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        width: 160px;
        padding: 28px 20px;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        text-decoration: none;
        color: inherit;
        transition: box-shadow 0.15s, transform 0.15s;
      }
      a.card:hover {
        box-shadow: 0 8px 24px rgba(0,0,0,0.10);
        transform: translateY(-2px);
      }
      .card-icon { font-size: 2.4rem; }
      .card-title { font-size: 1rem; font-weight: 600; }
      .card-sub { font-size: 12px; color: #9ca3af; }
    </style>
  </head>
  <body>
    <div class="landing">
      <h1>markdown-stream</h1>
      <p>选择框架进入对应的 playground</p>
      <div class="cards">
        <a class="card" href="/vue3.html">
          <span class="card-icon">💚</span>
          <span class="card-title">Vue 3</span>
          <span class="card-sub">@markdown-stream/vue3</span>
        </a>
        <a class="card" href="/react.html">
          <span class="card-icon">💙</span>
          <span class="card-title">React</span>
          <span class="card-sub">@markdown-stream/react</span>
        </a>
        <a class="card" href="/vue2.html">
          <span class="card-icon">🟢</span>
          <span class="card-title">Vue 2</span>
          <span class="card-sub">@markdown-stream/vue2</span>
        </a>
      </div>
    </div>
  </body>
</html>
